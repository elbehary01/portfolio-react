server {
  listen 80;
  server_name _;

  # Client site at root
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://api:9000$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /healthz { proxy_pass http://api:9000/healthz; }
  location = /sitemap.xml { proxy_pass http://api:9000/sitemap.xml; }


  location / {
    try_files $uri /index.html;
  }
}


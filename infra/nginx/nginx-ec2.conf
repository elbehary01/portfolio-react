# =============================================================
# Nginx config for portfolio app
# Place this file at: /etc/nginx/sites-available/portfolio
# Then: sudo ln -s /etc/nginx/sites-available/portfolio/etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
# =============================================================

server {
    listen 80;
    server_name _;   # Replace with your actual domain

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    server_tokens off;

    # ── API → backend (port 9000) ─────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Socket.IO (WebSocket) ─────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ── Health check passthrough ──────────────────────────────
    location = /healthz {
        proxy_pass http://127.0.0.1:9000/healthz;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:9000/sitemap.xml;
    }


    # ── Client storefront → / ─────────────────────────────────
    location / {
        root  /home/ubuntu/portfolio/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}

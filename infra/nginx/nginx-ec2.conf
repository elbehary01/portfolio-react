# =============================================================
# Nginx config for portfolio app with HTTPS
# Place this file at: /etc/nginx/sites-available/portfolio
# Then: sudo ln -s /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
# =============================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name elbehary.com www.elbehary.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name elbehary.com www.elbehary.com;

    # SSL certificates (replace with your actual paths from Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/elbehary.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elbehary.com/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    # ── API → backend (port 9000) ─────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Socket.IO (WebSocket) ─────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ── Health check passthrough ──────────────────────────────
    location = /healthz {
        proxy_pass http://127.0.0.1:9000/healthz;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:9000/sitemap.xml;
    }

    # ── Client storefront → / ─────────────────────────────────
    location / {
        root  /home/ubuntu/portfolio/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
